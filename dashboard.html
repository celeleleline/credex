<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>CREDEX - Dashboard</title>
</head>
<body>
    <div class="nav-bar">
        <div class="nav-left">
            <h1>CREDEX</h1>
        </div>
    </div>

    <div class="dashboard-one-page">
     
        <div class="top-row">
            <div class="user-section">
                <span id="message">Welcome, <span id="username-display">User</span>!</span>
                <button onclick="showSettings()" class="btn-settings">⚙️</button>
            </div>
        </div>

        <div class="dashboard-grid">
            
            <div class="left-column">
                <div class="progress-container">
                    <div class="progress-bar-bg">
                        <div class="progress-fill" id="credit-progress"></div>
                    </div>
                    <div class="progress-numbers">
                        <span id="current-credits">0</span> / <span id="goal-credits">60</span> credits
                    </div>
                </div>

                <div class="stats-container">
                    <div class="stat-row excellence-row">
                        <span class="stat-label">Excellence</span>
                        <span class="stat-value" id="excellence-total">0</span>
                    </div>
                    <div class="stat-row merit-row">
                        <span class="stat-label">Merit</span>
                        <span class="stat-value" id="merit-total">0</span>
                    </div>
                    <div class="stat-row achieved-row">
                        <span class="stat-label">Achieved</span>
                        <span class="stat-value" id="achieved-total">0</span>
                    </div>
                    <div class="stat-row total-row">
                        <span class="stat-label">Total</span>
                        <span class="stat-value" id="total-credits">0</span>
                    </div>
                </div>
            </div>

            <div class="middle-column">
                <div class="chart-container-big">
                    <canvas id="credit-chart" width="400" height="400"></canvas>
                </div>
            </div>

            <div class="right-column">
                <button onclick="showAddCreditPopup()" class="btn-action btn-add">
                    <span class="btn-icon">+</span>
                    <span class="btn-text">Add</span>
                </button>
                
                <button onclick="showSubtractCreditPopup()" class="btn-action btn-subtract">
                    <span class="btn-icon">−</span>
                    <span class="btn-text">Subtract</span>
                </button>
            </div>
        </div>
    </div>

    <div class="subjects-strip">
        <span class="subjects-label">Your subjects:</span>
        <div id="subjects-display" class="subjects-tags"></div>
    </div>

    <div id="add-credit-popup" class="popup-overlay">
        <div class="popup-content">
            <h2>Add New Credits</h2>
            
            <label>Subject:
                <select id="subject-select"></select>
            </label>
            
            <label>Credits:
                <input type="number" id="credit-amount" min="1" max="7" value="4">
            </label>

            <label>Grade:
                <select id="grade-select">
                    <option value="Achieved">Achieved</option>
                    <option value="Merit">Merit</option>
                    <option value="Excellence">Excellence</option>
                </select>
            </label>
            
            <div class="popup-buttons">
                <button onclick="addCredit()">Add</button>
                <button onclick="hideAddCreditPopup()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="subtract-credit-popup" class="popup-overlay">
        <div class="popup-content">
            <h2>Subtract Credits</h2>
            
            <label>Subject:
                <select id="subtract-subject-select"></select>
            </label>
            
            <label>Credits to remove:
                <input type="number" id="subtract-credit-amount" min="1" max="7" value="4">
            </label>
            
            <div class="popup-buttons">
                <button onclick="subtractCredit()">Subtract</button>
                <button onclick="hideSubtractCreditPopup()">Cancel</button>
            </div>
        </div>
    </div>

<div id="settings-popup" class="popup-overlay">
    <div class="popup-content">
        <h2>Settings</h2>
        
        <div style="max-height: 60vh; overflow-y: auto; padding-right: 10px;">
            <div class="settings-section">
                <h3>Background Gradient</h3>
                <label>Color 1:</label>
                <input type="color" id="gradient-color1" value="#9b59b6">
                <label>Color 2:</label>
                <input type="color" id="gradient-color2" value="#3498db">
                <button onclick="applyGradient()" class="settings-btn">Apply Gradient</button>
            </div>
            
            <div class="settings-section">
                <h3>Theme</h3>
                <button onclick="setTheme('light')" class="theme-btn light-btn">Light Mode</button>
                <button onclick="setTheme('dark')" class="theme-btn dark-btn">Dark Mode</button>
            </div>
            
            <div class="settings-section">
                <h3>Credit Goal</h3>
                <input type="number" id="settings-credit-goal" value="60" min="1" max="100">
            </div>
            
            <div class="settings-section">
                <h3>Endorsement Goal</h3>
                <select id="settings-endorsement-goal">
                    <option value="Achieved">Achieved</option>
                    <option value="Merit">Merit</option>
                    <option value="Excellence">Excellence</option>
                </select>
            </div>
            
            <div class="settings-section">
                <h3>Account</h3>
                <button onclick="logout()" class="logout-settings-btn">Logout</button>
            </div>
        </div>
        
        <div class="popup-buttons" style="margin-top: 20px;">
            <button onclick="saveSettings()">Save</button>
            <button onclick="closeSettings()">Close</button>
        </div>
    </div>
</div>

    <div id="success-popup" class="popup-overlay">
        <div class="popup-content success-popup">
            <div class="confetti-container" id="confetti-container"></div>
            <h2 id="success-message">4 Achieved Digital Technology credits successfully added!</h2>
            <div class="success-buttons">
                <button onclick="addAnotherCredit()" class="btn-secondary">Add More</button>
                <button onclick="closeSuccessPopup()" class="btn-primary">Back</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
